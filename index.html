<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self' https: data: 'unsafe-inline' 'unsafe-eval'; connect-src 'self' https://*.supabase.co wss://*.supabase.co https://*.serper.dev https://google.serper.dev https://generativelanguage.googleapis.com https://api.firecrawl.dev https://*.firecrawl.dev https://api.exa.ai https://servicodados.ibge.gov.br https://brasilapi.com.br https://api.z-api.io; img-src 'self' data: https: http: blob: *; font-src 'self' https: data:;">

  <!-- SEO / Meta Tags Otimizadas para Google -->
  <title>LeadMatrix Pro | A Nova Fronteira da Prospecção B2B com I.A.</title>
  <meta name="description"
    content="A LeadMatrix é o Revenue OS definitivo para prospecção neural. Encontre leads qualificados em tempo real extraindo dados do Google Maps, CNPJ e Redes Sociais com Inteligência Artificial avançada. Turbine suas vendas hoje!" />
  <meta name="keywords"
    content="prospecção de leads, leads b2b, geração de leads, inteligência artificial vendas, crm vendas, automação de marketing, ferramenta de vendas, extração de leads, google maps scraper, prospecção ativa, revenue os, lead matrix" />
  <meta name="author" content="LeadMatrix Team" />
  <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
  <link rel="canonical" href="https://leadmatrix.com.br" />

  <!-- Open Graph / Redes Sociais -->
  <meta property="og:locale" content="pt_BR" />
  <meta property="og:type" content="website" />
  <meta property="og:title" content="LeadMatrix Pro - Prospecção Neural e Vendas B2B com I.A." />
  <meta property="og:description"
    content="O Apollo brasileiro chegou. Pare de procurar e comece a fechar com o sistema mais avançado de extração e inteligência de leads do mercado." />
  <meta property="og:url" content="https://leadmatrix.com.br" />
  <meta property="og:site_name" content="LeadMatrix" />
  <meta property="og:image" content="https://leadmatrix.com.br/og-image.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:image:type" content="image/png" />

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="LeadMatrix Pro | Inteligência em Vendas B2B" />
  <meta name="twitter:description"
    content="Extraia leads qualificados com um clique. A revolução da prospecção neural chegou ao Brasil." />
  <meta name="twitter:image" content="https://leadmatrix.com.br/og-image.png" />

  <!-- Structured Data JSON-LD -->
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "LeadMatrix Pro",
      "operatingSystem": "Web",
      "applicationCategory": "BusinessApplication",
      "description": "Sistema de Prospecção Neural B2B com Inteligência Artificial para geração de leads qualificados.",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "BRL"
      },
      "aggregateRating": {
        "@type": "AggregateRating",
        "ratingValue": "4.9",
        "ratingCount": "1250"
      }
    }
  </script>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    window.onerror = function (msg, url, line, col, error) {
      alert("⚠️ ERRO DE SISTEMA:\n" + msg + "\n\nArquivo: " + url + "\nLinha: " + line);
    };
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: 'var(--color-primary)',
            secondary: 'var(--color-secondary)',
            accent: 'var(--color-accent)',
          }
        }
      }
    }
  </script>
  <script>
    // Bloqueio imediato para proteção de IP
    document.addEventListener('contextmenu', event => event.preventDefault());
    
    document.onkeydown = function (e) {
      // F12
      if (e.keyCode === 123) return false;
      // Ctrl+Shift+I (Inspecionar)
      if (e.ctrlKey && e.shiftKey && e.keyCode === 'I'.charCodeAt(0)) return false;
      // Ctrl+Shift+C (Inspecionar Elemento)
      if (e.ctrlKey && e.shiftKey && e.keyCode === 'C'.charCodeAt(0)) return false;
      // Ctrl+Shift+J (Console)
      if (e.ctrlKey && e.shiftKey && e.keyCode === 'J'.charCodeAt(0)) return false;
      // Ctrl+U (Ver código-fonte)
      if (e.ctrlKey && e.keyCode === 'U'.charCodeAt(0)) return false;
    };
  </script>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Roboto+Mono:wght@400;500&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --color-primary: #f97316;
      --color-secondary: #0f172a;
      --color-accent: #fb923c;
      --color-background: #020617;
      --color-sidebar: rgba(2, 6, 23, 0.95);
    }

    body {
      font-family: 'Inter', sans-serif;
      background-color: #020617;
      color: #f1f5f9;
      overflow: hidden;
      /* App handles its own scroll */
    }

    .font-mono {
      font-family: 'Roboto Mono', monospace;
    }

    .glass {
      background: rgba(15, 23, 42, 0.7);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .neon-glow-orange {
      box-shadow: 0 0 15px rgba(249, 115, 22, 0.3);
    }

    .neon-glow-navy {
      box-shadow: 0 0 15px rgba(15, 23, 42, 0.3);
    }

    .liquid-gradient {
      background: linear-gradient(135deg, #f97316 0%, #0f172a 100%);
    }
  </style>
  <link rel="icon" type="image/png" href="/pwa-icon-192.png" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="/pwa-icon-192.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="stylesheet" href="/index.css">
</head>

<body>
  <div id="root"></div>

</body>

</html>
